<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background: #111E16;
    color: #55C78E;
  }
  a { color: #55C78E; }
</style>
<script>
  var params = new URLSearchParams(window.location.search);
  var token = params.get('t');
  var tripToken = params.get('tt');
  var ref = params.get('ref');
  var from = params.get('from');
  if (tripToken) {
    window.location.replace('/trip-invite/' + encodeURIComponent(tripToken));
  } else if (token) {
    window.location.replace('/plan-invite/' + encodeURIComponent(token));
  } else if (ref) {
    var dest = '/invite?ref=' + encodeURIComponent(ref);
    if (from) dest += '&from=' + encodeURIComponent(from);
    window.location.replace(dest);
  } else {
    window.location.replace('/invite');
  }
</script>
</head>
<body>
<p>Redirecting to <a href="/">Parade</a>...</p>
</body>
